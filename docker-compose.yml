# version removed (obsolete in Compose v2+)

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pte_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-port_terminal_erp}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pte_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids conflict with existing postgres)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pte_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          5000
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME:-port_terminal_erp}
      DB_USER:       ${DB_USER:-postgres}
      DB_PASSWORD:   ${DB_PASSWORD}
      JWT_SECRET:    ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      QR_CODE_BASE_URL: ${QR_CODE_BASE_URL:-http://localhost}
    ports:
      - "5000:5000"
    volumes:
      - pte_logs:/app/logs

  # ── Frontend (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pte_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "8080:80"   # host 8080 (port 80 may need admin rights on Windows)

volumes:
  pte_pgdata:
  pte_logs:

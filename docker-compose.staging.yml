services:
  # ── PostgreSQL Database (Staging) ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pte_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-port_terminal_erp_staging}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pte_staging_pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (Staging) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pte_staging_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:         staging
      PORT:             5000
      DB_HOST:          db
      DB_PORT:          5432
      DB_NAME:          ${DB_NAME:-port_terminal_erp_staging}
      DB_USER:          ${DB_USER:-postgres}
      DB_PASSWORD:      ${DB_PASSWORD}
      JWT_SECRET:       ${JWT_SECRET}
      CORS_ORIGIN:      ${CORS_ORIGIN:-http://localhost:8090}
      QR_CODE_BASE_URL: ${QR_CODE_BASE_URL:-http://localhost:8090}
    ports:
      - "5001:5000"
    volumes:
      - pte_staging_logs:/app/logs

  # ── Frontend / Nginx (Staging) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pte_staging_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "8090:80"

volumes:
  pte_staging_pgdata:
  pte_staging_logs:

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/pte-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/pte-frontend

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & unit tests (backend) ──────────────────────────────────────────
  backend-test:
    name: Backend – lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:    test
      DB_HOST:     localhost
      DB_PORT:     5432
      DB_NAME:     test_db
      DB_USER:     postgres
      DB_PASSWORD: testpassword
      JWT_SECRET:  ci-test-secret-do-not-use-in-prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run migrations
        run: npm run migrate

      - name: Run tests
        run: npm test --if-present

  # ── 2. Build & lint (frontend) ───────────────────────────────────────────────
  frontend-build:
    name: Frontend – build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── 3. Docker build & push (main branch only) ────────────────────────────────
  docker-push:
    name: Docker – build & push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. Deploy (main branch only, optional — fill in your deploy target) ──────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        # Replace with your preferred deploy method.
        # Example: SSH into a VPS and run docker compose pull + up.
        run: |
          echo "Deploy step — configure SSH key + HOST in repo secrets:"
          echo "  DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH"
          echo ""
          echo "Typical command:"
          echo "  ssh user@host 'cd /opt/pte && docker compose pull && docker compose up -d'"
        # Uncomment and configure when ready:
        # uses: appleboy/ssh-action@v1.0.3
        # with:
        #   host:     ${{ secrets.DEPLOY_HOST }}
        #   username: ${{ secrets.DEPLOY_USER }}
        #   key:      ${{ secrets.DEPLOY_SSH_KEY }}
        #   script: |
        #     cd ${{ secrets.DEPLOY_PATH }}
        #     docker compose pull
        #     docker compose up -d --remove-orphans
